$kind: http-request
name: '02 - Admin Login'
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@example.com",
      "password": "12345"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Admin login succeeds", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Admin login returns token", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("token");
        pm.expect(json.token).to.be.a("string").and.not.empty;
      });

      pm.test("Admin login returns user object", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("user");
        pm.expect(json.user).to.have.property("role");
      });

      const json = pm.response.json();
      if (json.token) {
        pm.environment.set("adminToken", json.token);
      }
      if (json.user && json.user._id) {
        pm.environment.set("adminUserId", json.user._id);
      }
