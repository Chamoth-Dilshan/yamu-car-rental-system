$kind: http-request
name: '14 - Customer Create Vehicle Booking'
method: POST
url: '{{baseUrl}}/api/bookings/vehicle'
order: 14000
headers:
  - key: Authorization
    value: 'Bearer {{customerToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "vehicleId": "{{e2eVehicleId}}",
      "pickupLocation": "Colombo Fort",
      "destination": "Kandy",
      "notes": "E2E test booking - please have car ready by 8am",
      "startDate": "{{e2eBookingStartDate}}",
      "endDate": "{{e2eBookingEndDate}}"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      const today = new Date();
      const startDate = new Date(today);
      startDate.setDate(today.getDate() + 30);
      const endDate = new Date(startDate);
      endDate.setDate(startDate.getDate() + 3);

      const fmt = (d) => d.toISOString().split('T')[0];
      pm.environment.set("e2eBookingStartDate", fmt(startDate));
      pm.environment.set("e2eBookingEndDate", fmt(endDate));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Customer can create a vehicle booking", () => {
        pm.response.to.have.status(201);
      });

      pm.test("Booking is created with pending status", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("booking");
        pm.expect(json.booking.bookingStatus).to.equal("pending");
        pm.expect(json.booking.paymentStatus).to.equal("pending");
      });

      pm.test("Booking references correct vehicle", () => {
        const json = pm.response.json();
        const vehicleId = pm.environment.get("e2eVehicleId");
        pm.expect(json.booking.vehicle._id || json.booking.vehicle).to.equal(vehicleId);
      });

      pm.test("Booking has a booking number", () => {
        const json = pm.response.json();
        pm.expect(json.booking).to.have.property("bookingNo");
        pm.expect(json.booking.bookingNo).to.be.a("string").and.not.empty;
      });

      const json = pm.response.json();
      if (json.booking && json.booking._id) {
        pm.environment.set("e2eBookingId", json.booking._id);
        pm.environment.set("e2eBookingNo", json.booking.bookingNo);
        pm.environment.set("e2eBookingTotal", json.booking.totalAmount);
      }
