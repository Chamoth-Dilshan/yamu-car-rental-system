$kind: http-request
name: '07 - Register Staff User'
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 7000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "fullName": "E2E Test Staff",
      "email": "{{e2eStaffEmail}}",
      "password": "{{e2eStaffPassword}}",
      "username": "{{e2eStaffUsername}}",
      "phone": "+94772220002",
      "address": "2 Staff Road, Kandy",
      "city": "Kandy"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      const ts = Date.now();
      pm.environment.set("e2eStaffEmail", `e2e.staff.${ts}@test.com`);
      pm.environment.set("e2eStaffUsername", `e2estaff${ts}`);
      pm.environment.set("e2eStaffPassword", "E2eTest@123");
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Staff registration succeeds", () => {
        pm.response.to.have.status(201);
      });
