$kind: http-request
name: '15 - Customer View My Bookings'
method: GET
url: '{{baseUrl}}/api/bookings/customer'
order: 15000
headers:
  - key: Authorization
    value: 'Bearer {{customerToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Customer can view their bookings", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Bookings list is returned", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("bookings");
        pm.expect(json.bookings).to.be.an("array");
      });

      const json = pm.response.json();
      const bookingId = pm.environment.get("e2eBookingId");
      const found = (json.bookings || []).find(b => b._id === bookingId);

      pm.test("New booking appears in customer booking list", () => {
        pm.expect(found, "E2E booking not found in customer list").to.exist;
      });

      pm.test("Booking status is pending", () => {
        pm.expect(found.bookingStatus).to.equal("pending");
      });
