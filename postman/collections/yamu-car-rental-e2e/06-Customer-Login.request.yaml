$kind: http-request
name: '06 - Customer Login'
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{e2eCustomerEmail}}",
      "password": "{{e2eCustomerPassword}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Customer login succeeds", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Customer login returns token", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("token");
        pm.expect(json.token).to.be.a("string").and.not.empty;
      });

      pm.test("Customer role is customer", () => {
        const json = pm.response.json();
        pm.expect(json.user.role).to.equal("customer");
      });

      const json = pm.response.json();
      if (json.token) {
        pm.environment.set("customerToken", json.token);
      }
      if (json.user && json.user._id) {
        pm.environment.set("e2eCustomerUserId", json.user._id);
      }
