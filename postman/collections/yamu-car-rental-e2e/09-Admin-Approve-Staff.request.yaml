$kind: http-request
name: '09 - Admin Approve & Activate Staff'
method: PUT
url: '{{baseUrl}}/api/admin/users/{{e2eStaffUserId}}'
order: 9000
headers:
  - key: Authorization
    value: 'Bearer {{adminToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "accountStatus": "active",
      "roles": [
        {
          "roleKey": "customer",
          "roleStatus": "active",
          "verificationStatus": "verified",
          "isPrimary": false
        },
        {
          "roleKey": "staff",
          "roleStatus": "active",
          "verificationStatus": "verified",
          "isPrimary": true
        }
      ]
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Admin can activate staff account", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Staff account is now active", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("user");
        pm.expect(json.user.accountStatus).to.equal("active");
      });
