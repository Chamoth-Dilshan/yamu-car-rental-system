$kind: http-request
name: '18 - Customer Mark Payment as Paid'
method: PUT
url: '{{baseUrl}}/api/bookings/{{e2eBookingId}}/payment'
order: 18000
headers:
  - key: Authorization
    value: 'Bearer {{customerToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "paymentStatus": "paid"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Customer can mark payment as paid", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Payment status is now paid", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("booking");
        pm.expect(json.booking.paymentStatus).to.equal("paid");
      });

      pm.test("Booking status remains confirmed after payment", () => {
        const json = pm.response.json();
        pm.expect(json.booking.bookingStatus).to.equal("confirmed");
      });
