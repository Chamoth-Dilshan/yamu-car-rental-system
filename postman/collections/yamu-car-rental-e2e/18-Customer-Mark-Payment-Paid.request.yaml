$kind: http-request
name: '18 - Customer Cannot Pay Before Completion'
method: POST
url: '{{baseUrl}}/api/payments/checkout/{{e2eBookingId}}'
order: 18000
headers:
  - key: Authorization
    value: 'Bearer {{customerToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "method": "card",
      "amount": {{e2eBookingTotal}},
      "card": {
        "cardholderName": "Test Customer",
        "cardNumber": "4111111111111111",
        "expiryMonth": "12",
        "expiryYear": "2030",
        "cvv": "123"
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Customer cannot pay before trip completion", () => {
        pm.response.to.have.status(400);
      });

      pm.test("Payment is blocked until trip completion", () => {
        const json = pm.response.json();
        pm.expect(json.message).to.include("trip is completed");
      });
