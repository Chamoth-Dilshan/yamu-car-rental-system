$kind: http-request
name: '17 - Staff Confirm Booking'
method: PUT
url: '{{baseUrl}}/api/bookings/{{e2eBookingId}}/staff-status'
order: 17000
headers:
  - key: Authorization
    value: 'Bearer {{staffToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "bookingStatus": "confirmed"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Staff can confirm the booking", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Booking status is now confirmed", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("booking");
        pm.expect(json.booking.bookingStatus).to.equal("confirmed");
      });

      pm.test("Payment is still pending after confirmation", () => {
        const json = pm.response.json();
        pm.expect(json.booking.paymentStatus).to.equal("pending");
      });
