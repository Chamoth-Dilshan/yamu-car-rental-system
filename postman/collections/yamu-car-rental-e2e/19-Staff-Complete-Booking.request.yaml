$kind: http-request
name: '19 - Staff Complete Booking'
method: PUT
url: '{{baseUrl}}/api/bookings/{{e2eBookingId}}/staff-status'
order: 19000
headers:
  - key: Authorization
    value: 'Bearer {{staffToken}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "bookingStatus": "completed"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Staff can mark booking as completed", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Booking status is now completed", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("booking");
        pm.expect(json.booking.bookingStatus).to.equal("completed");
      });

      pm.test("Payment status is still paid after completion", () => {
        const json = pm.response.json();
        pm.expect(json.booking.paymentStatus).to.equal("paid");
      });
