$kind: http-request
name: '13 - Customer Browse Vehicles'
method: GET
url: '{{baseUrl}}/api/vehicles'
order: 13000
headers:
  - key: Authorization
    value: 'Bearer {{customerToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Customer can browse vehicles", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Vehicles list is returned", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("vehicles");
        pm.expect(json.vehicles).to.be.an("array");
      });

      const json = pm.response.json();
      const vehicleId = pm.environment.get("e2eVehicleId");
      const found = (json.vehicles || []).find(v => v._id === vehicleId);

      pm.test("Newly created vehicle appears in listing", () => {
        pm.expect(found, "E2E vehicle not found in listing").to.exist;
      });
