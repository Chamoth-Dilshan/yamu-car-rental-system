$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "fullName": "John Doe",
      "email": "john@example.com",
      "password": "Password123!",
      "username": "johndoe",
      "phone": "+94771234567",
      "address": "123 Main St",
      "city": "Colombo"
    }
