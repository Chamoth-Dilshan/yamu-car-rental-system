$kind: http-request
name: Update Profile
method: PUT
url: '{{baseUrl}}/api/users/profile'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: formdata
  content:
    - key: fullName
      type: text
      value: John Doe
    - key: email
      type: text
      value: john@example.com
    - key: username
      type: text
      value: johndoe
    - key: phone
      type: text
      value: '+94771234567'
    - key: address
      type: text
      value: '123 Main St'
    - key: city
      type: text
      value: Colombo
    - key: dob
      type: text
      value: ''
    - key: bio
      type: text
      value: ''
    - key: preferredLanguage
      type: text
      value: ''
    - key: emergencyContactName
      type: text
      value: ''
    - key: emergencyContactPhone
      type: text
      value: ''
    - key: emergencyContactRelationship
      type: text
      value: ''
    - key: password
      type: text
      value: ''
    - key: currentPassword
      type: text
      value: ''
    - key: profilePic
      type: file
      src: ''
