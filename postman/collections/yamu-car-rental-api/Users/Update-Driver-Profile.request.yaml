$kind: http-request
name: Update Driver Profile
method: PUT
url: '{{baseUrl}}/api/users/driver-profile'
order: 4000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "drivingLicenseNumber": "B1234567",
      "licenseExpiryDate": "2027-12-31",
      "nicId": "123456789V",
      "serviceArea": "Colombo",
      "providerDetails": "Experienced driver with 5 years"
    }
