$kind: http-request
name: Update Staff Profile
method: PUT
url: '{{baseUrl}}/api/users/staff-profile'
order: 5000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "storeName": "Yamu Car Rentals",
      "storeOwner": "Jane Smith",
      "businessRegistrationNumber": "BRN123456",
      "storeAddress": "456 Business Ave, Colombo",
      "storeContactNumber": "+94112345678",
      "storeEmail": "store@example.com"
    }
