$kind: http-request
name: Update Staff Vehicle Booking Status
method: PUT
url: '{{baseUrl}}/api/bookings/{{bookingId}}/staff-status'
order: 9000
headers:
  - key: Authorization
    value: 'Bearer {{token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "bookingStatus": "confirmed"
    }
