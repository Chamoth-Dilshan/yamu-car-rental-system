$kind: collection
name: Yamu Car Rental API
description: API collection for the Yamu Car Rental System. Covers authentication, user management, vehicles, driver ads, bookings, and admin operations.
variables:
  - key: baseUrl
    value: 'http://localhost:5000'
  - key: token
    value: ''
  - key: vehicleId
    value: ''
  - key: driverAdId
    value: ''
  - key: bookingId
    value: ''
  - key: userId
    value: ''
  - key: roleKey
    value: driver
  - key: notificationId
    value: ''
